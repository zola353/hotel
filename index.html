        function deg2rad(deg) { return deg * (Math.PI / 180); }

        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ============================================================
        function Login({ users, hotelLocation, onLoginSuccess }) {
            const [selectedRole, setSelectedRole] = useState(null);
            const [selectedUserId, setSelectedUserId] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [error, setError] = useState('');
            const [bypassLocation, setBypassLocation] = useState(true);
            const [checkingLocation, setCheckingLocation] = useState(false);

            const filteredUsers = users.filter(u => u.role === selectedRole);

            useEffect(() => {
                if (filteredUsers.length > 0) setSelectedUserId(filteredUsers[0].id);
                else setSelectedUserId('');
                setPassword('');
                setError('');
            }, [selectedRole, users]);

            const handleRoleSelect = (role) => {
                setSelectedRole(role);
                if (role === 'customer') setError('');
            };

            const handleLogin = () => {
                if (!selectedRole) return;
                if (selectedRole === 'customer') {
                    onLoginSuccess({ id: 'CUST01', name: 'ደንበኛ', role: 'customer' });
                    return;
                }
                const user = users.find(u => u.id === selectedUserId);
                if (!user) { setError('እባክዎ ተጠቃሚ ይምረጡ'); return; }
                if (password !== user.password) {
                    setError('⛔ የተሳሳተ ፓስዎርድ!');
                    setPassword('');
                    return;
                }
                if (selectedRole === 'waiter') {
                    const lat = hotelLocation.lat;
                    const lng = hotelLocation.lng;
                    if (!lat || !lng) {
                        setError('⚠️ የሆቴሉ ሎኬሽን አልተዘጋጀም! እባክዎ በባለቤት አካውንት ያዘጋጁ።');
                        return;
                    }
                    if (bypassLocation) { onLoginSuccess(user); return; }
                    setCheckingLocation(true);
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                setCheckingLocation(false);
                                const dist = getDistanceFromLatLonInMeters(lat, lng, pos.coords.latitude, pos.coords
                                    .longitude);
                                if (dist > 100) {
                                    setError(`⛔ ከሆቴሉ 100 ሜትር ራዲየስ ውስጥ አይደሉም! የአሁን ርቀት: ${Math.round(dist)} ሜትር.`);
                                } else {
                                    onLoginSuccess(user);
                                }
                            },

                                setError('📍 የአካባቢ መገኛን ማግኘት አልተቻለም። እባክዎ መገኛውን ይፍቀዱ ወይም Simulation Bypass ይጠቀሙ።');

                        );

                        setCheckingLocation(false);
                        onLoginSuccess(user);
                    }

            const totalDebt = myDebts.reduce((s, d) => s + d.qty * d.price, 0);

            const activeTables = Object.values(tableOrders || {}).filter(o =>
                o && o.status === 'open' && o.waiterId === waiterId

            const unassignedTables = Object.values(tableOrders || {}).filter(o =>
                o && o.status === 'open' && !o.waiterId && o.items && o.items.length > 0

            const showAlert = (msg) => {

                if (isNaN(qty) || qty <= 0) return alert('ትክክለኛ ቁጥር ያስገቡ');

        function GameDashboard({ games, onStartGame, onEndGame }) {
            const [customerNameInput, setCustomerNameInput] = useState('');
            const [selectedLocation, setSelectedLocation] = useState('1');
            const [selectedEndId, setSelectedEndId] = useState('');
            const [gameReportFilter, setGameReportFilter] = useState('all');
            const LOCATIONS = [1, 2, 3, 4, 5];
            const GAME_RATE = 1.70;

            const activeGames = games.filter(g => g.status === 'active');
            const closedGames = games.filter(g => g.status === 'closed');
            const openSpots = LOCATIONS.filter(loc => !activeGames.find(g => g.location === loc)).length;
            const occupiedSpots = LOCATIONS.length - openSpots;
            const todayStr = new Date().toDateString();
            const dailyGameRevenue = closedGames
                .filter(g => g.endTime && new Date(g.endTime).toDateString() === todayStr)
                .reduce((sum, g) => sum + (g.cost || 0), 0);

            const handleStartGame = () => {
                if (!customerNameInput.trim()) return alert('እባክዎ የደንበኛ ስም ያስገቡ!');
                const loc = parseInt(selectedLocation);
                if (activeGames.find(g => g.location === loc)) return alert(`ቦታ ${loc} በአሁኑ ሰዓት ተይዟል!`);
                onStartGame(customerNameInput.trim(), loc);
                setCustomerNameInput('');
                alert(`🎮 ጨዋታ በቦታ ${loc} ተጀምሯል!`);
            };

            const handleEndGame = () => {
                if (!selectedEndId) return alert('እባክዎ የሚዘጋ ጨዋታ ይምረጡ!');
                onEndGame(parseInt(selectedEndId));
                setSelectedEndId('');
            };

            const getFilteredGames = () => {
                const now = new Date();
                return games.filter(g => {
                    if (g.status === 'active') return false;
                    const endTime = g.endTime ? new Date(g.endTime) : null;
                    if (!endTime) return false;
                    const diffDays = Math.ceil(Math.abs(now.getTime() - endTime.getTime()) / (1000 * 60 * 60 * 24));
                    if (gameReportFilter === 'daily') return endTime.toDateString() === todayStr;
                    if (gameReportFilter === 'weekly') return diffDays <= 7;
                    if (gameReportFilter === 'monthly') return endTime.getMonth() === now.getMonth() && endTime
                        .getFullYear() === now.getFullYear();
                    if (gameReportFilter === 'yearly') return endTime.getFullYear() === now.getFullYear();
                    return true;
                });
            };
            const filteredGamesList = getFilteredGames();

            const [marqueeText, setMarqueeText] = React.useState('እንኳን ደህና መጡ ወደ ሆቴላችን! በምርጥ አገልግሎት እናገኛለን!');
            const [barmanReceivedItems, setBarmanReceivedItems] = React.useState({});
            const [games, setGames] = React.useState([]);
            const [tableOrders, setTableOrders] = React.useState({});
            const [pendingCustomerOrders, setPendingCustomerOrders] = React.useState({});
            const [loading, setLoading] = React.useState(true);

            const params = new URLSearchParams(window.location.search);
            const isCustomer = params.get('customer') === '1';
            const tableNum = parseInt(params.get('table') || '1');

            React.useEffect(() => {
                const unsubs = [];
                const onVal = (ref, cb) => {
                    const handler = ref.on('value', (snap) => {
                        const data = snap.val();
                        cb(data);
                    });
                    unsubs.push(() => ref.off('value', handler));
                };
                onVal(refs.users, (data) => { if (data) setUsers(Object.values(data)); else setUsers([]); });
                onVal(refs.store, (data) => { if (data) setStore(Object.values(data)); else setStore([]); });
                onVal(refs.waiterDebts, (data) => { if (data) setWaiterDebts(data); else setWaiterDebts({}); });
                onVal(refs.salesHistory, (data) => { if (data) setSalesHistory(Object.values(data)); else setSalesHistory(
                        []); });
                onVal(refs.waiterRatings, (data) => { if (data) setWaiterRatings(data); else setWaiterRatings({}); });
                onVal(refs.complaints, (data) => { if (data) setComplaints(Object.values(data)); else setComplaints([]); });
                onVal(refs.feedbacks, (data) => { if (data) setFeedbacks(Object.values(data)); else setFeedbacks([]); });
                onVal(refs.hotelLocation, (data) => { if (data) setHotelLocation(data); else setHotelLocation({ lat: null,
                        lng: null }); });
                onVal(refs.whatsapp, (data) => { if (data) setWhatsappNumber(data); else setWhatsappNumber(''); });
                onVal(refs.marquee, (data) => { if (data) setMarqueeText(data); else setMarqueeText(
                        'እንኳን ደህና መጡ ወደ ሆቴላችን! በምርጥ አገልግሎት እናገኛለን!'); });
                onVal(refs.barmanReceivedItems, (data) => { if (data) setBarmanReceivedItems(data); else
                        setBarmanReceivedItems({}); });
                onVal(refs.games, (data) => { if (data) setGames(Object.values(data)); else setGames([]); });
                onVal(refs.tableOrders, (data) => { if (data) setTableOrders(data); else setTableOrders({}); });
                onVal(refs.pendingCustomerOrders, (data) => { if (data) setPendingCustomerOrders(data); else
                        setPendingCustomerOrders({}); });

                Promise.all([
                    refs.users.once('value'),
                    refs.store.once('value'),
                    refs.pendingCustomerOrders.once('value')
                ]).then(() => setLoading(false));

                return () => unsubs.forEach(fn => fn());
            }, []);

            const handleSaveWhatsApp = (num) => refs.whatsapp.set(num);
            const handleUpdateMarquee = (text) => refs.marquee.set(text);
            const handleCreateStaff = (name, role) => {
                const id = `${role.toUpperCase()}${String(users.filter(u => u.role === role).length + 1).padStart(2, '0')}`;
                const newUser = { id, name, role, password: '1234' };
                refs.users.child(id).set(newUser);
                alert(`ሰራተኛ ${name} (${id}) ተመዝግቧል! ፓስዎርድ: 1234`);
            };
            const handleAddItemToStore = (item) => refs.store.child(item.code).set(item);
            const handleUpdateItemPrice = (code, price) => refs.store.child(code).update({ price });
            const handleSaveHotelLocation = (lat, lng) => refs.hotelLocation.set({ lat, lng });
            const handleClearWaiterDebt = (waiterId) => refs.waiterDebts.child(waiterId).set(null);
            const handleDismissComplaint = (key) => refs.complaints.child(key).remove();

            // -- CUSTOMER ORDER FLOW: goes to pendingCustomerOrders --
            const handleAddCustomerOrder = (tableId, itemCode, qty, customerName) => {
                const item = store.find(i => i.code === itemCode);
                if (!item) return;
                const newOrder = {
                    tableId: String(tableId),
                    customerName: customerName || 'ያልተገለጸ',
                    items: [{ code: item.code, name: item.name, price: item.price, qty }],
                    timestamp: new Date().toISOString(),
                    status: 'pending',
                    waiterId: null
                };
                const key = refs.pendingCustomerOrders.push().key;
                refs.pendingCustomerOrders.child(key).set(newOrder);
                // Reduce stock
                refs.store.child(itemCode).update({ stock: item.stock - qty });
            };

            // -- FORWARD CUSTOMER ORDER FROM BARMAN TO WAITER --
            const handleForwardCustomerOrder = (orderKey, waiterId) => {
                const order = pendingCustomerOrders[orderKey];
                if (!order) return;
                const tableId = order.tableId;
                const items = order.items || [];
                const waiter = users.find(u => u.id === waiterId);
                if (!waiter) return alert('የተመረጠው አስተናጋጅ አልተገኘም!');

                // Add to tableOrders
                const current = tableOrders[tableId];
                const customerItems = items.map(item => ({ ...item, source: 'customer' }));
                if (current && current.status === 'open') {
                    // Merge items
                    const mergedItems = [...current.items, ...customerItems];
                    const updateData = { items: mergedItems };
                    if (!current.waiterId) {
                        updateData.waiterId = waiterId;
                    }
                    refs.tableOrders.child(tableId).update(updateData);
                } else {
                    refs.tableOrders.child(tableId).set({
                        tableId: tableId,
                        status: 'open',
                        waiterId: waiterId,
                        items: customerItems,
                        createdAt: new Date().toISOString()
                    });
                }
                // Remove from pending
                refs.pendingCustomerOrders.child(orderKey).remove();
                alert(`✅ ትዕዛዝ ለአስተናጋጅ ${waiter.name} ተልኳል!`);
            };

            const handleSubmitComplaint = (waiterId, waiterName, itemCode, itemName, qty) => {
                const newComplaint = { waiterId, waiterName, itemCode, itemName, qty, date: new Date().toISOString() };
                const key = refs.complaints.push().key;
                refs.complaints.child(key).set(newComplaint);
            };

            const handleHandoverToBarman = (barmanId, itemCode, qty) => {
                const item = store.find(i => i.code === itemCode);
                if (!item) return;
                refs.store.child(itemCode).update({ stock: item.stock - qty });
                const current = barmanReceivedItems[barmanId] || {};
                const existing = current[itemCode];
                const newQty = (existing?.qty || 0) + qty;
                refs.barmanReceivedItems.child(`${barmanId}/${itemCode}`).set({
                    name: item.name,
                    qty: newQty,
                    price: item.price
                });
            };

            const handleClearBarmanDebt = (barmanId) => refs.barmanReceivedItems.child(barmanId).set(null);

            const handleHandoverToWaiter = (barmanId, waiterId, itemCode, qty) => {
                const bStock = barmanReceivedItems[barmanId] || {};
                const stockItem = bStock[itemCode];
                if (!stockItem || stockItem.qty < qty) return;
                const newQty = stockItem.qty - qty;
                if (newQty === 0) {
                    refs.barmanReceivedItems.child(`${barmanId}/${itemCode}`).remove();
                } else {
                    refs.barmanReceivedItems.child(`${barmanId}/${itemCode}`).update({ qty: newQty });
                }
                const currentDebt = Array.isArray(waiterDebts[waiterId]) ?
                    [...waiterDebts[waiterId]] :
                    Object.values(waiterDebts[waiterId] || {});
                const existingDebtIndex = currentDebt.findIndex(d => d.code === itemCode);
                if (existingDebtIndex >= 0) {
                    currentDebt[existingDebtIndex].qty += qty;
                } else {
                    currentDebt.push({ code: itemCode, name: stockItem.name, price: stockItem.price, qty });
                }
                refs.waiterDebts.child(waiterId).set(currentDebt);
            };

            const handleRecordBarmanSale = (barmanId, itemCode, qty) => {
                const bStock = barmanReceivedItems[barmanId] || {};
                const stockItem = bStock[itemCode];
                if (!stockItem || stockItem.qty < qty) return;
                const newQty = stockItem.qty - qty;
                if (newQty === 0) {
                    refs.barmanReceivedItems.child(`${barmanId}/${itemCode}`).remove();
                } else {
                    refs.barmanReceivedItems.child(`${barmanId}/${itemCode}`).update({ qty: newQty });
                }
                const saleRecord = {
                    id: Date.now().toString(),
                    waiterId: 'barman_direct',
                    date: new Date().toISOString(),
                    total: stockItem.price * qty,
                    profit: stockItem.price * qty,
                    items: [{ code: itemCode, name: stockItem.name, price: stockItem.price, qty }]
                };
                refs.salesHistory.push().set(saleRecord);
            };

            // FIX for issue #3: remove waiterId ownership check
            const handleAddWaiterOrder = (tableId, itemCode, qty, waiterId) => {
                const item = store.find(i => i.code === itemCode);
                if (!item) return;
                const key = String(tableId);
                const current = tableOrders[key];
                const newItem = { code: item.code, name: item.name, price: item.price, qty, source: 'waiter' };
                if (current && current.status === 'open') {
                    // Any waiter can add items to any open table
                    // If no waiter assigned, assign this waiter
                    let updateData = { items: [...current.items, newItem] };
                    if (!current.waiterId) {
                        updateData.waiterId = waiterId;
                    }
                    refs.tableOrders.child(key).update(updateData);
                } else {
                    refs.tableOrders.child(key).set({
                        tableId: key,
                        status: 'open',
                        waiterId: waiterId,
                        items: [newItem],
                        createdAt: new Date().toISOString()
                    });
                }
                refs.store.child(itemCode).update({ stock: item.stock - qty });
            };

            const handleCloseTable = (tableId, saleRecord) => {
                refs.salesHistory.push().set(saleRecord);
                refs.tableOrders.child(String(tableId)).update({ status: 'closed' });
                const order = tableOrders[String(tableId)];
                if (order && order.waiterId && waiterDebts[order.waiterId]) {
                    const rawDebts = waiterDebts[order.waiterId];
                    const debts = Array.isArray(rawDebts) ? [...rawDebts] : Object.values(rawDebts || {});
                    order.items.forEach(item => {
                        const idx = debts.findIndex(d => d.code === item.code);
                        if (idx !== -1) {
                            if (debts[idx].qty >= item.qty) {
                                debts[idx].qty -= item.qty;
                                if (debts[idx].qty === 0) debts.splice(idx, 1);
                            }
                        }
                    });
                    refs.waiterDebts.child(order.waiterId).set(debts);
                }
            };

            const handleSubmitRating = (waiterId, rating, customerName, tableId) => {
                refs.waiterRatings.push().set({ waiterId, rating, customerName, tableId, date: new Date().toISOString() });
            };

            const handleSubmitFeedback = (tableId, msg) => {
                refs.feedbacks.push().set({ tableId, message: msg, time: new Date().toLocaleString() });
            };

            const handleStartGame = (customerName, location) => {
                const active = games.filter(g => g.status === 'active');
                const id = active.length + 1;
                const newGame = { id, customerName, location, startTime: new Date().toISOString(), status: 'active' };
                refs.games.push().set(newGame);
            };

            const handleEndGame = (gameId) => {
                const game = games.find(g => g.id === gameId);
                if (!game) return;
                const start = new Date(game.startTime);
                const end = new Date();
                const minutes = Math.max(1, Math.floor((end.getTime() - start.getTime()) / 60000));
                const cost = minutes * 1.70;
                const key = Object.keys(games).find(k => games[k].id === gameId);
                if (key) {
                    refs.games.child(key).update({ endTime: end.toISOString(), minutes, cost, status: 'closed' });
                }
            };

            if (loading) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center bg-slate-100' },
                    React.createElement('div', { className: 'text-2xl font-bold text-amber-600 animate-pulse' },
                        '⏳ እየጫነ...'
                    )
                );
            }

            if (isCustomer) {
                return React.createElement(React.Fragment, null,
                    React.createElement(Marquee, { text: marqueeText }),
                    React.createElement('div', { className: 'max-w-3xl mx-auto p-4' },
                        React.createElement(CustomerDashboard, {
                            tableNum: tableNum,
                            store: store,
                            tableOrders: tableOrders,
                            users: users,
                            onAddCustomerOrder: handleAddCustomerOrder,
                            onSubmitRating: handleSubmitRating,
                            onSubmitFeedback: handleSubmitFeedback
                        })
                    )
                );
            }

            if (!user) {
                return React.createElement(Login, { users: users, hotelLocation: hotelLocation, onLoginSuccess: setUser });
            }

            const renderDashboard = () => {
                switch (user.role) {
                    case 'owner':
                        return React.createElement(OwnerDashboard, {
                            users: users,
                            store: store,
                            waiterDebts: waiterDebts,
                            salesHistory: salesHistory,
                            waiterRatings: waiterRatings,
                            complaints: complaints,
                            feedbacks: feedbacks,
                            hotelLocation: hotelLocation,
                            whatsappNumber: whatsappNumber,
                            onSaveWhatsApp: handleSaveWhatsApp,
                            onUpdateMarquee: handleUpdateMarquee,
                            onCreateStaff: handleCreateStaff,
                            onAddItemToStore: handleAddItemToStore,
                            onUpdateItemPrice: handleUpdateItemPrice,
                            onSaveHotelLocation: handleSaveHotelLocation,
                            onClearWaiterDebt: handleClearWaiterDebt,
                            onDismissComplaint: handleDismissComplaint,
                            barmanReceivedItems: barmanReceivedItems,
                            games: games,
                            onHandoverToBarman: handleHandoverToBarman,
                            onClearBarmanDebt: handleClearBarmanDebt,
                            onStartGame: handleStartGame,
                            onEndGame: handleEndGame
                        });
                    case 'waiter':
                        return React.createElement(WaiterDashboard, {
                            users: users,
                            store: store,
                            tableOrders: tableOrders,
                            waiterDebts: waiterDebts,
                            onAddWaiterOrder: handleAddWaiterOrder,
                            onClearWaiterDebt: handleClearWaiterDebt,
                            onSubmitComplaint: handleSubmitComplaint,
                            waiterId: user.id,
                            waiterName: user.name,
                            salesHistory: salesHistory,
                            onCloseTable: handleCloseTable,
                            onUpdateMarquee: handleUpdateMarquee,
                            marqueeText: marqueeText
                        });
                    case 'barman':
                        return React.createElement(BarmanDashboard, {
                            users: users,
                            store: store,
                            barmanReceivedItems: barmanReceivedItems,
                            waiterDebts: waiterDebts,
                            tableOrders: tableOrders,
                            onHandoverToWaiter: handleHandoverToWaiter,
                            onRecordBarmanSale: handleRecordBarmanSale,
                            onClearBarmanDebt: handleClearBarmanDebt,
                            barmanId: user.id,
                            barmanName: user.name,
                            pendingCustomerOrders: pendingCustomerOrders,
                            onForwardCustomerOrder: handleForwardCustomerOrder
                        });
                    case 'game':
                        return React.createElement(GameDashboard, { games: games, onStartGame: handleStartGame,
                            onEndGame: handleEndGame });
                    case 'customer':
                        return React.createElement(CustomerDashboard, {
                            tableNum: 1,
                            store: store,
                            tableOrders: tableOrders,
                            users: users,
                            onAddCustomerOrder: handleAddCustomerOrder,
                            onSubmitRating: handleSubmitRating,
                            onSubmitFeedback: handleSubmitFeedback
                        });
                    default:
                        return React.createElement('div', { className: 'p-8 text-center' },
                            React.createElement('h2', { className: 'text-xl font-bold' }, '👋 እንኳን ደህና መጡ ', user.name,
                                '!'),
                            React.createElement('p', { className: 'text-slate-500' },
                                'ሚናዎ ገና አልተዘጋጀም። እባክዎ ከባለቤቱ ጋር ይገናኙ።'
                            ),
                            React.createElement('button', {
                                onClick: () => setUser(null),
                                className: 'mt-4 bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold'
                            }, 'ውጣ')
                        );
                }
            };

            return React.createElement('div', { className: 'min-h-screen bg-slate-100' },
                React.createElement(Marquee, { text: marqueeText }),
                React.createElement('div', { className: 'max-w-6xl mx-auto p-4' },
                    React.createElement('div', { className: 'flex justify-end mb-4' },
                        React.createElement('button', {
                            onClick: () => setUser(null),
                            className: 'bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow'
                        }, '🚪 ውጣ (Logout)')
                    ),
                    renderDashboard()
                )
            );
        }

        // ============================================================
        // 11. RENDER
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
